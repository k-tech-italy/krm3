name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      be_image_tag:
        description: 'Backend version to deploy (e.g. 3.4.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  version-check:
    name: Verify BE version is on INT
    runs-on: ubuntu-latest
    env:
      RELEASE_URL: "https://krm3int.k-tech.it/static/release.json"
    steps:
      - name: Fetch INT release.json and compare
        run: |
          RELEASE=$(curl -s "${RELEASE_URL}?$(date +%s)")
          INT_BE=$(echo $RELEASE | jq -r '.be.version')
          REQ_BE="${{ inputs.be_image_tag }}"

          echo "INT BE version : $INT_BE"
          echo "Requested version: $REQ_BE"

          HIGHEST=$(printf '%s\n' "$INT_BE" "$REQ_BE" | sort -V | tail -n1)

          if [ "$HIGHEST" != "$INT_BE" ]; then
            echo "Requested version $REQ_BE is higher than INT version $INT_BE — aborting."
            exit 1
          fi

          echo "Version $REQ_BE is <= INT version $INT_BE — proceeding."

  deploy-prod:
    name: Deploy to Production
    needs: version-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy BE via Rancher API
        env:
          RANCHER_URL: ${{ vars.RANCHER_URL }}
          RANCHER_TOKEN: ${{ secrets.RANCHER_TOKEN }}
          BE_IMAGE_TAG: ${{ inputs.be_image_tag }}
        run: |
          curl -sf -X PATCH \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg img "ghcr.io/k-tech-italy/krm3:${BE_IMAGE_TAG}" \
              '{containers: [{name: "krm3", image: $img}]}')" \
            "https://r2.k-tech.it/v3/project/local:p-vnrc7/workloads/deployment:krm3:krm3"
